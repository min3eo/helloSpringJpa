<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#xc0c1;&#xd488; &#xbaa9;&#xb85d; - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .action-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; }
        .btn:hover { background: #357abd; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #545b62; }
        .search-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
        .search-form input, .search-form select, .search-form button { padding: 8px 10px; font: inherit; }
        .search-form button { background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .search-form button:hover { background: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        tr:hover { background: #f5f8ff; }
        .price { text-align: right; font-weight: bold; color: #e74c3c; }
        .detail-link { color: #4a90d9; text-decoration: none; }
        .detail-link:hover { text-decoration: underline; }
        .edit-link { color: #e67e22; text-decoration: none; margin-right: 8px; }
        .edit-link:hover { text-decoration: underline; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.95em; padding: 0; text-decoration: underline; }
        .btn-delete:hover { color: #c0392b; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>&#xc0c1;&#xd488; &#xbaa9;&#xb85d;</h1>

    <div class="alert-success" th:if="${successMessage}">
        <span th:text="${successMessage}">&#xc131;&#xacf5; &#xba54;&#xc2dc;&#xc9c0;</span>
    </div>

    <div class="action-links">
        <a class="btn" th:href="@{/products/create}">+ &#xc0c8; &#xc0c1;&#xd488; &#xb4f1;&#xb85d;</a>
        <a class="btn btn-secondary" th:href="@{/categories}">&#xce74;&#xd14c;&#xace0;&#xb9ac; &#xbaa9;&#xb85d;</a>
        <a class="btn btn-secondary" th:href="@{/categories/create}">&#xce74;&#xd14c;&#xace0;&#xb9ac; &#xb4f1;&#xb85d;</a>
    </div>

    <form class="search-form" method="get" th:action="@{/products}">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="&#xc0c1;&#xd488;&#xba85; &#xac80;&#xc0c9;">
        <select name="categoryId">
            <option value="">-- &#xc804;&#xccb4; &#xce74;&#xd14c;&#xace0;&#xb9ac; --</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${cat.id == categoryId}">&#xce74;&#xd14c;&#xace0;&#xb9ac;</option>
        </select>
        <button type="submit">&#xac80;&#xc0c9;</button>
    </form>

    <div class="empty-msg" th:if="${#lists.isEmpty(products)}">
        &#xac80;&#xc0c9; &#xacb0;&#xacfc;&#xac00; &#xc5c6;&#xc2b5;&#xb2c8;&#xb2e4;.
    </div>

    <table th:unless="${#lists.isEmpty(products)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>&#xc0c1;&#xd488;&#xba85;</th>
                <th>&#xce74;&#xd14c;&#xace0;&#xb9ac;</th>
                <th>&#xac00;&#xaca9;</th>
                <th>&#xc791;&#xc5c5;</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td>
                    <a class="detail-link"
                       th:href="@{/products/{id}(id=${product.id})}"
                       th:text="${product.name}">&#xc0c1;&#xd488;&#xba85;</a>
                </td>
                <td th:text="${product.category != null ? product.category.name : '-'}">&#xce74;&#xd14c;&#xace0;&#xb9ac;</td>
                <td class="price"
                    th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + '&#xc6d0;'">
                    15,000&#xc6d0;
                </td>
                <td>
                    <a class="edit-link"
                       th:href="@{/products/{id}/edit(id=${product.id})}">&#xc218;&#xc815;</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post"
                          style="display: inline;"
                          onsubmit="return confirm('\uc815\ub9d0 \uc0ad\uc81c\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c? \uc774 \uc791\uc5c5\uc740 \ub418\ub3cc\ub9b4 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.');">
                        <button type="submit" class="btn-delete">&#xc0ad;&#xc81c;</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <hr>
    <div id="practice-footer" style="margin-top:20px; font-size:14px; color:#555;"></div>

    <script>
    function updateDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const formatted = `${year}\uB144 ${month}\uC6D4 ${day}\uC77C ${hours}:${minutes}:${seconds}`;
        const footerText = `\uC2E4\uC2B5 \uC218\uD589 \uC77C\uC2DC: ${formatted} | \uD559\uBC88: 2071403 | \uC131\uBA85: \uAD8C\uBBFC\uC11C`;
        document.getElementById("practice-footer").textContent = footerText;
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
    </script>

</body>
</html>
