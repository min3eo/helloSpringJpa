<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|&#xc0c1;&#xd488; &#xc0c1;&#xc138; - ${product.name}|">&#xc0c1;&#xd488; &#xc0c1;&#xc138;</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .back-btn:hover { background: #545b62; }
        .detail-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 24px; }
        .detail-row { display: flex; margin-bottom: 16px; border-bottom: 1px solid #e9ecef; padding-bottom: 16px; }
        .detail-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .detail-label { font-weight: bold; color: #495057; width: 120px; min-width: 120px; }
        .detail-value { color: #212529; flex: 1; }
        .price-value { font-size: 1.4em; font-weight: bold; color: #e74c3c; }
        .description-value { white-space: pre-wrap; line-height: 1.6; }
        .id-badge { background: #4a90d9; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.85em; }
        .action-area { margin-top: 24px; display: flex; gap: 12px; align-items: center; }
        .btn-edit { display: inline-block; padding: 10px 24px; background: #e67e22; color: white; text-decoration: none; border-radius: 4px; }
        .btn-edit:hover { background: #ca6f1e; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 10px 24px; font-size: 1em; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>&#xc0c1;&#xd488; &#xc0c1;&#xc138; &#xc815;&#xbcf4;</h1>

    <a class="back-btn" th:href="@{/products}">&#x2190; &#xbaa9;&#xb85d;&#xc73c;&#xb85c; &#xb3cc;&#xc544;&#xac00;&#xae30;</a>

    <div class="detail-card" th:object="${product}">
        <div class="detail-row">
            <span class="detail-label">&#xc0c1;&#xd488; ID</span>
            <span class="detail-value">
                <span class="id-badge" th:text="'#' + *{id}">#1</span>
            </span>
        </div>

        <div class="detail-row">
            <span class="detail-label">&#xc0c1;&#xd488;&#xba85;</span>
            <span class="detail-value" th:text="*{name}">&#xc0c1;&#xd488;&#xba85;</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">&#xce74;&#xd14c;&#xace0;&#xb9ac;</span>
            <span class="detail-value" th:text="${product.category != null ? product.category.name : '-'}">&#xce74;&#xd14c;&#xace0;&#xb9ac;</span>
        </div>

        <div class="detail-row">
            <span class="detail-label">&#xac00;&#xaca9;</span>
            <span class="detail-value price-value"
                  th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + '&#xc6d0;'">
                15,000&#xc6d0;
            </span>
        </div>

        <div class="detail-row">
            <span class="detail-label">&#xc0c1;&#xd488; &#xc124;&#xba85;</span>
            <span class="detail-value description-value"
                  th:text="*{description}">&#xc0c1;&#xd488; &#xc124;&#xba85;&#xc774; &#xc5ec;&#xae30;&#xc5d0; &#xd45c;&#xc2dc;&#xb429;&#xb2c8;&#xb2e4;.</span>
        </div>
    </div>

    <div class="action-area">
        <a class="btn-edit"
           th:href="@{/products/{id}/edit(id=${product.id})}">&#xc218;&#xc815;</a>

        <form th:action="@{/products/{id}/delete(id=${product.id})}"
              method="post"
              onsubmit="return confirm('\uc815\ub9d0\ub85c \uc0ad\uc81c\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?\n\uc774 \uc791\uc5c5\uc740 \ub418\ub3cc\ub9b4 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.');">
            <button type="submit" class="btn-delete">&#xc0ad;&#xc81c;</button>
        </form>
    </div>

    <hr>
    <div id="practice-footer" style="margin-top:20px; font-size:14px; color:#555;"></div>

    <script>
    function updateDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const formatted = `${year}\uB144 ${month}\uC6D4 ${day}\uC77C ${hours}:${minutes}:${seconds}`;
        const footerText = `\uC2E4\uC2B5 \uC218\uD589 \uC77C\uC2DC: ${formatted} | \uD559\uBC88: 2071403 | \uC131\uBA85: \uAD8C\uBBFC\uC11C`;
        document.getElementById("practice-footer").textContent = footerText;
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
    </script>

</body>
</html>
