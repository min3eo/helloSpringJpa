<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>
    <style>
        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
        }
        h1 {
            border-bottom: 2px solid #4a90d9;
            padding-bottom: 10px;
            color: #2c3e50;
            margin-bottom: 24px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 24px;
        }
        .back-btn:hover {
            background: #545b62;
        }
        .form-card {
            background: white;
            border: 1px solid #d9e6f2;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(74, 144, 217, 0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #495057;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }
        .field-error {
            border-color: #e74c3c !important;
        }
        .error-msg {
            display: block;
            margin-top: 6px;
            color: #e74c3c;
            font-size: 0.9em;
        }
        .hint {
            margin: 0;
            color: #6c757d;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .btn-submit {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background: #357abd;
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<a class="back-btn" th:href="@{/categories}">목록으로 돌아가기</a>

<div class="form-card">
    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">
                카테고리 이름<span class="required">*</span>
            </label>
            <input type="text"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                   placeholder="예: 전자제품, 도서, 식품">
            <span class="error-msg"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">이름 오류</span>
            <p class="hint">중복되지 않는 카테고리 이름을 입력하세요.</p>
        </div>
        <div>
            <button type="submit" class="btn-submit">등록</button>
        </div>
    </form>
</div>

</body>
</html>
