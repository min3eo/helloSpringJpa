<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#xce74;&#xd14c;&#xace0;&#xb9ac; &#xb4f1;&#xb85d;</title>
    <style>
        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
        }
        h1 {
            border-bottom: 2px solid #4a90d9;
            padding-bottom: 10px;
            color: #2c3e50;
            margin-bottom: 24px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 24px;
        }
        .back-btn:hover {
            background: #545b62;
        }
        .form-card {
            background: white;
            border: 1px solid #d9e6f2;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(74, 144, 217, 0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #495057;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }
        .field-error {
            border-color: #e74c3c !important;
        }
        .error-msg {
            display: block;
            margin-top: 6px;
            color: #e74c3c;
            font-size: 0.9em;
        }
        .hint {
            margin: 0;
            color: #6c757d;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .btn-submit {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background: #357abd;
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<h1>&#xce74;&#xd14c;&#xace0;&#xb9ac; &#xb4f1;&#xb85d;</h1>

<a class="back-btn" th:href="@{/categories}">&#xbaa9;&#xb85d;&#xc73c;&#xb85c; &#xb3cc;&#xc544;&#xac00;&#xae30;</a>

<div class="form-card">
    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">
                &#xce74;&#xd14c;&#xace0;&#xb9ac; &#xc774;&#xb984;<span class="required">*</span>
            </label>
            <input type="text"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                   placeholder="&#xc608;: &#xc804;&#xc790;&#xc81c;&#xd488;, &#xb3c4;&#xc11c;, &#xc2dd;&#xd488;">
            <span class="error-msg"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">&#xc774;&#xb984; &#xc624;&#xb958;</span>
            <p class="hint">&#xc911;&#xbcf5;&#xb418;&#xc9c0; &#xc54a;&#xb294; &#xce74;&#xd14c;&#xace0;&#xb9ac; &#xc774;&#xb984;&#xc744; &#xc785;&#xb825;&#xd558;&#xc138;&#xc694;.</p>
        </div>
        <div>
            <button type="submit" class="btn-submit">&#xb4f1;&#xb85d;</button>
        </div>
    </form>
</div>

<hr>
<div id="practice-footer" style="margin-top:20px; font-size:14px; color:#555;"></div>

<script>
function updateDateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const formatted = `${year}\uB144 ${month}\uC6D4 ${day}\uC77C ${hours}:${minutes}:${seconds}`;
    const footerText = `\uC2E4\uC2B5 \uC218\uD589 \uC77C\uC2DC: ${formatted} | \uD559\uBC88: 2071403 | \uC131\uBA85: \uAD8C\uBBFC\uC11C`;
    document.getElementById("practice-footer").textContent = footerText;
}

setInterval(updateDateTime, 1000);
updateDateTime();
</script>

</body>
</html>
